version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Kafka + Zookeeper
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: streamrx-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo ruok | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: streamrx-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_COMPRESSION_TYPE: lz4
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Create topics on startup
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic rx.prescriptions --partitions 12 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic rx.adverse_events --partitions 6 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic rx.alerts --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic rx.dead_letter_queue --partitions 3 --replication-factor 1
      echo 'Topics created successfully.'
      kafka-topics --list --bootstrap-server kafka:29092
      "

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: streamrx-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  # ---------------------------------------------------------------------------
  # StreamRx Application Services
  # ---------------------------------------------------------------------------
  prescription-producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamrx-rx-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      LOG_LEVEL: INFO
      ENVIRONMENT: development
    command: ["python", "-m", "stream_rx.producers.prescription_producer", "--eps", "50"]
    restart: unless-stopped

  adverse-event-producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamrx-ae-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      LOG_LEVEL: INFO
      ENVIRONMENT: development
    command: ["python", "-m", "stream_rx.producers.adverse_event_producer", "--eps", "10"]
    restart: unless-stopped

  api-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamrx-api
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      LOG_LEVEL: INFO
      ENVIRONMENT: development
    command: ["stream-rx-api"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  zk-data:
  zk-log:
  kafka-data:
  redis-data:
